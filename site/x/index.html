<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Analysis Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=20260501-0430">
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>X Analysis Dashboard</h1>
        <p id="subtitle">Loading @aleabitoreddit market notes</p>
      </div>
      <a class="header-link" href="../../data/site/x-analysis/latest.json" target="_blank" rel="noreferrer">JSON</a>
    </header>

    <main>
      <section class="summary" aria-live="polite">
        <div>
          <span class="summary-label">Status</span>
          <strong id="statusText">Loading</strong>
        </div>
        <div>
          <span class="summary-label">Generated</span>
          <strong id="generatedAt">-</strong>
        </div>
        <div>
          <span class="summary-label">Posts</span>
          <strong id="postCount">-</strong>
        </div>
      </section>

      <section id="errorBox" class="error-box" hidden></section>

      <section id="postsPanel" class="tab-panel" aria-label="Posts">
        <div class="section-heading">
          <h2>Posts</h2>
          <span>Latest posts and mentioned tickers.</span>
        </div>
        <div id="postsList" class="card-list">
          <div class="empty-state">Loading posts...</div>
        </div>
      </section>
    </main>

    <script src="x.js?v=20260501-0430" defer></script>
  </body>
</html>
