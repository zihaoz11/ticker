<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Analysis Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=20260505-tear-tabs-fix">
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>X Analysis Dashboard</h1>
        <p id="subtitle">Loading @aleabitoreddit market notes</p>
      </div>
      <div class="header-actions">
        <button id="refreshButton" class="refresh-button" type="button">Refresh Posts</button>
        <a class="header-link" href="https://zihaoz11.github.io/ticker/site/x/" target="_blank" rel="noreferrer">Public</a>
        <a class="header-link" href="https://zihaoz11.github.io/ticker/data/site/x-analysis/latest.json" target="_blank" rel="noreferrer">JSON</a>
      </div>
    </header>

    <main>
      <section class="summary" aria-live="polite">
        <div>
          <span class="summary-label">Status</span>
          <strong id="statusText">Loading</strong>
        </div>
        <div>
          <span class="summary-label">Generated</span>
          <strong id="generatedAt">-</strong>
        </div>
        <div>
          <span id="primaryMetricLabel" class="summary-label">Posts</span>
          <strong id="postCount">-</strong>
        </div>
        <div>
          <span id="secondaryMetricLabel" class="summary-label">Visibility</span>
          <strong id="visibilityCount">-</strong>
        </div>
      </section>

      <section id="errorBox" class="error-box" hidden></section>
      <section id="refreshStatus" class="refresh-status" hidden></section>

      <nav id="authorTabs" class="author-tabs" aria-label="Authors">
        <button class="author-button is-active" type="button" data-author="serenity">Serenity</button>
      </nav>

      <nav id="serenityTabs" class="tabs" aria-label="Dashboard views">
        <button class="tab-button is-active" type="button" data-tab="posts">Posts</button>
        <button class="tab-button" type="button" data-tab="report">Daily Report</button>
      </nav>

      <section id="postsPanel" class="tab-panel" aria-label="Posts">
        <div class="section-heading">
          <h2>Posts</h2>
          <span id="postPanelSummary">-</span>
        </div>
        <div class="filter-toolbar" aria-label="Post filters">
          <button class="filter-button is-active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="public">Public</button>
          <button class="filter-button" type="button" data-filter="sub">Sub</button>
          <button class="filter-button" type="button" data-filter="favorites">Favorites</button>
        </div>
        <div class="date-toolbar" aria-label="Post date filter">
          <button id="prevDateButton" class="date-nav-button" type="button" aria-label="Previous day">&lsaquo;</button>
          <div class="date-picker-wrap">
            <strong id="dateLabel">Today</strong>
            <input id="datePicker" type="date" aria-label="Choose post date">
          </div>
          <button id="nextDateButton" class="date-nav-button" type="button" aria-label="Next day">&rsaquo;</button>
          <span id="dateCount" class="date-count">- posts</span>
        </div>
        <div id="postsList" class="card-list">
          <div class="empty-state">Loading posts...</div>
        </div>
      </section>

      <section id="reportPanel" class="tab-panel" aria-label="Daily Report" hidden>
        <div class="section-heading">
          <h2>Daily Report</h2>
          <span id="reportPanelSummary">-</span>
        </div>
        <div id="dailyReport" class="report-body">
          <div class="empty-state">Loading daily report...</div>
        </div>
      </section>

      <section id="tearPanel" class="tab-panel" aria-label="tear email summaries" hidden>
        <div class="section-heading">
          <h2>tear</h2>
          <span id="tearPanelSummary">-</span>
        </div>
        <nav id="tearLayerTabs" class="content-tabs" aria-label="tear content layers"></nav>
        <div id="tearEntriesList" class="card-list">
          <div class="empty-state">Loading tear summaries...</div>
        </div>
      </section>
    </main>

    <script src="x.js?v=20260505-tear-tabs-fix" defer></script>
  </body>
</html>
